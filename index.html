<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AIDZBIKES</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(15,15,15,0.9);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    z-index: 1000;
    box-shadow: 0 0 10px #00ff88;
}

nav a {
    color: white;
    margin: 0 20px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
}

/* HEADER */
header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

header h1 {
    font-size: 55px;
    text-shadow: 0 0 20px #00ff88;
}

button {
    padding: 12px 25px;
    background: #00ff88;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 20px;
    transition: 0.3s;
}

button:hover {
    background: #00cc6a;
    box-shadow: 0 0 15px #00ff88;
    transform: scale(1.05);
}

/* SECTIONS */
section {
    padding: 100px 20px;
    text-align: center;
}

.box {
    background: #111;
    margin: 20px auto;
    padding: 30px;
    border-radius: 15px;
    max-width: 700px;
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #00ff88;
}

/* FOOTER */
footer {
    padding: 20px;
    background: #111;
    text-align: center;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="#home">Home</a>
    <a href="#kits">Kits</a>
    <a href="#kontakt">Kontakt</a>
</nav>

<!-- HEADER -->
<header id="home">
    <h1>🚲 AIDZBIKES</h1>
    <p>E-Bike Kits neu gedacht</p>
    <button onclick="scrollToSection('kits')">Kits ansehen</button>
</header>

<!-- KITS -->
<section id="kits">
    <div class="box">
        <h2>Unsere Kits</h2>
        <p>Hochwertige E-Bike Kits mit eigenen 3D-gedruckten Zusatzteilen.</p>
        <button>Jetzt anfragen</button>
    </div>
</section>

<!-- KONTAKT -->
<section id="kontakt">
    <div class="box">
        <h2>Kontakt</h2>
        <p>Email: aidzbikes@gmail.com</p>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2026 AIDZBIKES
</footer>

<script>
function scrollToSection(id) {
    document.getElementById(id).scrollIntoView();
}
</script>

</body>
</html>
